apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: gcr.io/erivan-proyectofinal/backend:latest
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          value: postgres-service   # nombre del Service en Kubernetes
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: erivan
        - name: DB_PASSWORD
          value: erivan123
        - name: DB_NAME
          value: microservicios_db
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata   # 👈 subdirectorio limpio
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
